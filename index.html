<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Library & Verify System</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #0b0b0b 80%); min-height: 100vh; overflow-x: hidden; }
        
        nav { background: rgba(0,0,0,0.9); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-links button { background: none; border: none; color: white; margin: 0 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .nav-links button:hover { color: var(--neon); }

        #admin-panel { display: none; background: #1a1a1b; padding: 25px; border-bottom: 3px solid var(--neon); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        .section { display: none; padding: 20px 40px; animation: fadeIn 0.5s; }
        .active { display: block; }

        .wheel-box { text-align: center; margin: 20px auto; padding: 25px; border: 2px dashed var(--neon); border-radius: 15px; width: 320px; background: rgba(0,0,0,0.6); }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.4s; position: relative; }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: var(--neon); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 30px; border-radius: 15px; z-index: 2000; width: 320px; border: 1px solid var(--neon); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1500; }
        
        input, textarea { padding: 10px; margin: 5px 0; border-radius: 5px; border: none; background: #222; width: 100%; color: white; box-sizing: border-box; }
        
        #verify-box { max-width: 400px; margin: 50px auto; text-align: center; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--accent); }
        
        .lib-card { background: #111; border: 1px solid var(--neon); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

<div id="overlay" class="overlay"></div>
<audio id="bg-music" loop></audio>

<nav>
    <div class="logo"><h1 onclick="showSection('home')">SWASCSHOP</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">Ana Sayfa</button>
        <button onclick="showSection('verify')">Doğrula</button>
        <button onclick="showSection('shop')">Mağaza</button>
        <button onclick="showSection('library')">Kütüphane</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <div class="admin-grid">
        <div>
            <h3>➕ Ürün Ekle</h3>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gImg" placeholder="Resim URL">
            <input type="text" id="gSecret" placeholder="Hesap Bilgileri (Gözükecek olan)">
            <button class="btn" onclick="addGame()">EKLE</button>
        </div>
        <div>
            <h3>🔑 Key & Müzik</h3>
            <textarea id="keyList" placeholder="Keyleri satır satır girin..."></textarea>
            <input type="text" id="musicUrl" placeholder="MP3 Link">
            <button class="btn" onclick="updateSettings()">KAYDET</button>
        </div>
    </div>
</div>

<div id="home" class="section active">
    <div class="wheel-box" id="daily-wheel">
        <h3>🎡 GÜNLÜK ÇARK</h3>
        <p id="wheel-msg">Giriş yap ve çevir!</p>
        <button class="btn" id="spin-btn" onclick="spinWheel()">ÇEVİR</button>
    </div>
    <h2 style="text-align:center;">Hoş Geldin! Oyunlarını görmek için "Doğrula" kısmına git.</h2>
</div>

<div id="verify" class="section">
    <div id="verify-box">
        <h2 style="color:var(--accent);">DOĞRULAMA SİSTEMİ</h2>
        <p>Satın aldığın keyi girerek mağazayı aktif et.</p>
        <input type="text" id="verifyKey" placeholder="KEY-XXXX-XXXX">
        <button class="btn" style="margin-top:10px; background:var(--accent);" onclick="checkVerifyKey()">MAĞAZAYI AÇ</button>
    </div>
</div>

<div id="shop" class="section">
    <h2 style="color:var(--neon);">🛒 MAĞAZA (Bir Oyun Seç)</h2>
    <div class="container" id="gameGrid"></div>
</div>

<div id="library" class="section">
    <h2 style="color:var(--warning);">📚 KÜTÜPHANEM</h2>
    <div id="libraryGrid">Henüz oyunun yok...</div>
</div>

<div id="auth-modal" class="modal">
    <h2 style="text-align:center;">Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ YAP</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    const adminUser = "Swascshop", adminPass = "12345", customerPass = "shop2026";
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user'), isVerified = false;

    window.onload = () => {
        if(currentUser) { setupUI(); checkWheelStatus(); checkLibrary(); } 
        else openModal('auth-modal');
        loadData();
    };

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== adminUser) {
            alert("Önce key doğrulamalısın!");
            showSection('verify');
            return;
        }
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = prompt("Şifre:");
        if(u.toLowerCase() === adminUser.toLowerCase() && p === adminPass) { localStorage.setItem('user', adminUser); location.reload(); }
        else if(u && p === customerPass) { localStorage.setItem('user', u); location.reload(); }
        else alert("Hatalı!");
    }

    function loadData() {
        db.ref('games').on('value', s => {
            const grid = document.getElementById('gameGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                const g = data[id];
                grid.innerHTML += `<div class="game-card">
                    <img src="${g.img}">
                    <div style="padding:15px;">
                        <h3>${g.title}</h3>
                        <button class="btn" onclick="claimGame('${id}', '${g.title}', '${g.secret}')">BU OYUNU SEÇ</button>
                    </div></div>`;
            });
        });
        if(currentUser === adminUser) db.ref('keys').on('value', s => { document.getElementById('keyList').value = (s.val() || []).join('\n'); });
        db.ref('settings/music').on('value', s => { if(s.val()) document.getElementById('bg-music').src = s.val(); });
    }

    function checkVerifyKey() {
        const inp = document.getElementById('verifyKey').value.trim();
        db.ref('keys').once('value', s => {
            let keys = s.val() || [];
            const idx = keys.indexOf(inp);
            if(idx > -1) {
                keys.splice(idx, 1);
                db.ref('keys').set(keys);
                isVerified = true;
                alert("Key doğrulandı! Mağaza açıldı.");
                showSection('shop');
            } else alert("Geçersiz Key!");
        });
    }

    function claimGame(id, title, secret) {
        db.ref('users/' + currentUser + '/library').push({ title, secret });
        alert(title + " kütüphanene eklendi!");
        isVerified = false; // Bir key bir oyun için
        showSection('library');
    }

    function checkLibrary() {
        db.ref('users/' + currentUser + '/library').on('value', s => {
            const grid = document.getElementById('libraryGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            if(Object.keys(data).length === 0) grid.innerHTML = "Henüz oyunun yok.";
            Object.keys(data).forEach(id => {
                const g = data[id];
                grid.innerHTML += `<div class="lib-card">
                    <strong>🎮 ${g.title}</strong><br>
                    <span style="color:var(--accent)">Bilgiler: ${g.secret}</span>
                </div>`;
            });
        });
    }

    // Çark ve Diğerleri
    function spinWheel() {
        const today = new Date().toDateString().replace(/\s/g, "");
        db.ref('wheelLog/' + currentUser + '/' + today).once('value', s => {
            if (s.exists() && currentUser !== adminUser) return alert("Yarın gel!");
            db.ref('wheelLog/' + currentUser + '/' + today).set({ hasSpun: true }).then(() => {
                document.getElementById('wheel-msg').innerText = "Kazandın! Adminle iletişime geç.";
                document.getElementById('spin-btn').disabled = true;
            });
        });
    }

    function checkWheelStatus() {
        const today = new Date().toDateString().replace(/\s/g, "");
        db.ref('wheelLog/' + currentUser + '/' + today).on('value', s => {
            if (s.exists() && currentUser !== adminUser) {
                document.getElementById('spin-btn').disabled = true;
                document.getElementById('spin-btn').innerText = "BİTTİ";
            }
        });
    }

    function addGame() {
        const title = document.getElementById('gTitle').value;
        const img = document.getElementById('gImg').value;
        const secret = document.getElementById('gSecret').value;
        db.ref('games').push({ title, img, secret });
        alert("Oyun eklendi!");
    }

    function updateSettings() {
        db.ref('keys').set(document.getElementById('keyList').value.split('\n').filter(k => k.trim()));
        db.ref('settings/music').set(document.getElementById('musicUrl').value);
        alert("Kaydedildi!");
    }

    function toggleMusic() {
        const m = document.getElementById('bg-music');
        if(m.paused) m.play(); else m.pause();
    }

    function setupUI() {
        document.getElementById('user-controls').innerHTML = `<button class="btn" onclick="toggleAdmin()">${currentUser}</button>`;
    }
    function toggleAdmin() { if(currentUser === adminUser) { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; } }
    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
// --- ADMIN AYARLARINI KAYDETME ---
function updateSettings() {
    const rewards = document.getElementById('wheelRewards').value;
    const music = document.getElementById('musicUrl').value;

    // Veritabanına ayarları gönderiyoruz
    db.ref('settings').update({
        wheel: rewards,
        music: music
    }).then(() => {
        alert("✅ AYARLAR GÜNCELLENDİ! Çark artık yeni ödülleri verecek.");
        loadSettings(); // Ayarları hemen sayfaya geri yükle
    }).catch(err => alert("Hata: " + err.message));
}

// --- GÜNCELLENMİŞ ÇARK ÇEVİRME ---
function spinWheel() {
    const today = new Date().toDateString().replace(/\s/g, "");
    
    db.ref('wheelLog/' + currentUser + '/' + today).once('value', s => {
        // Admin kısıtlamaya takılmaz, istediği kadar çevirir
        if (s.exists() && currentUser !== adminUser) {
            alert("Bugünlük hakkın bitti kanka!");
            return;
        }

        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        btn.innerText = "DÖNÜYOR...";

        // Admin panelinden yazdığın ödülleri anlık çekiyoruz
        db.ref('settings/wheel').once('value', snapshot => {
            const rawRewards = snapshot.val();
            // Eğer admin panelinde ödül yoksa bunlar yedek:
            const rewards = (rawRewards && rawRewards.trim() !== "") ? rawRewards.split(',') : ["Pas", "Key", "İndirim", "Üzgünüm"];
            
            setTimeout(() => {
                const win = rewards[Math.floor(Math.random() * rewards.length)];
                
                // Kayıt işlemi
                db.ref('wheelLog/' + currentUser + '/' + today).set({
                    hasSpun: true,
                    reward: win
                }).then(() => {
                    document.getElementById('wheel-msg').innerHTML = `🎉 KAZANDIN: <b style="color:var(--neon)">${win}</b>`;
                    if(currentUser !== adminUser) {
                        btn.innerText = "YARIN YİNE GEL";
                    } else {
                        btn.disabled = false;
                        btn.innerText = "TEKRAR DENE (ADMİN)";
                    }
                });
            }, 2000);
        });
    });
}</script>
</body>
</html>
