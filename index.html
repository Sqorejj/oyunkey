<<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OyunKey | Güvenli Oyun Alışverişi</title>
    <style>
        :root {
            --primary: #7289da;
            --bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        /* Navbar & Arama */
        nav {
            background: #000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-bar input {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            width: 250px;
        }

        /* Giriş Paneli */
        #auth-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none;
            z-index: 2000;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Oyun Kartları */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 2rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .game-info { padding: 15px; }

        /* Admin Paneli Stili */
        #admin-panel {
            display: none;
            background: #121212;
            padding: 1rem;
            border-bottom: 2px solid var(--primary);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo"><h1>OyunKey</h1></div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Oyun ara..." onkeyup="filterGames()">
    </div>
    <div id="user-menu">
        <button class="btn" onclick="toggleAuth()">Giriş Yap</button>
    </div>
</nav>

<!-- Admin Paneli (Sadece Giriş Yapınca Görünür) -->
<div id="admin-panel">
    <h3>Yönetici Paneli (Hoş geldin Sqorejj)</h3>
    <input type="text" id="newGameTitle" placeholder="Oyun Adı">
    <input type="text" id="newGamePrice" placeholder="Fiyat">
    <button class="btn" onclick="addGame()">Yeni Oyun Ekle</button>
</div>

<!-- Giriş Formu -->
<div id="auth-container">
    <h2 id="auth-title">Giriş Yap</h2>
    <input type="text" id="username" placeholder="Kullanıcı Adı" style="display:block; margin-bottom:10px; width:100%; padding:8px;">
    <input type="password" id="password" placeholder="Şifre" style="display:block; margin-bottom:10px; width:100%; padding:8px;">
    <button class="btn" onclick="login()">Giriş Yap</button>
    <button class="btn" style="background:#444" onclick="toggleAuth()">Kapat</button>
</div>

<div class="container" id="gameGrid">
    <!-- Örnek Oyunlar -->
    <div class="game-card">
        <img src="https://images.alphacoders.com/129/1291122.jpg" alt="MW2">
        <div class="game-info">
            <h3>Modern Warfare 2</h3>
            <p>Aksiyon / FPS</p>
            <strong>450 TL</strong>
        </div>
    </div>
    <div class="game-card">
        <img src="https://images.alphacoders.com/132/1321455.jpeg" alt="Brawl Stars">
        <div class="game-info">
            <h3>Brawl Stars</h3>
            <p>Mobil / Rekabetçi</p>
            <strong>Ücretsiz</strong>
        </div>
    </div>
</div>

<script>
    // Giriş Kontrolü
    function toggleAuth() {
        const auth = document.getElementById('auth-container');
        auth.style.display = auth.style.display === 'block' ? 'none' : 'block';
    }

    function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Basit kontrol (Sqorejj senin kullanıcı adın olsun)
        if(user === "Sqorejj" && pass === "1234") {
            alert("Yönetici girişi başarılı!");
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('user-menu').innerHTML = `<span style="color:var(--primary)">Hoş geldin, Admin Sqorejj</span>`;
            toggleAuth();
        } else {
            alert("Kullanıcı girişi başarılı!");
            document.getElementById('user-menu').innerHTML = `<span>Hoş geldin, ${user}</span>`;
            toggleAuth();
        }
    }

    // Arama Fonksiyonu
    function filterGames() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.querySelectorAll('.game-card');

        cards.forEach(card => {
            let title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(input) ? "block" : "none";
        });
    }

    // Admin: Oyun Ekleme
    function addGame() {
        const title = document.getElementById('newGameTitle').value;
        const price = document.getElementById('newGamePrice').value;
        
        if(title && price) {
            const grid = document.getElementById('gameGrid');
            const newCard = `
                <div class="game-card">
                    <img src="https://via.placeholder.com/300x150" alt="New Game">
                    <div class="game-info">
                        <h3>${title}</h3>
                        <p>Yeni Eklenen</p>
                        <strong>${price} TL</strong>
                    </div>
                </div>`;
            grid.innerHTML += newCard;
            alert("Oyun başarıyla eklendi!");
        }
    }
</script>

</body>
</html>
