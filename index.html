<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Fixed & Working</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* ÖNEMLİ: Tıklama kilidini açan ayar */
        * { box-sizing: border-box; }
        
        nav { background: rgba(0,0,0,0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 9999; backdrop-filter: blur(10px); }
        .nav-links button { background: none; border: none; color: white; margin: 0 10px; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; z-index: 10000; position: relative; }
        
        .section { display: none; padding: 40px; max-width: 1200px; margin: auto; position: relative; z-index: 10; }
        .active { display: block !important; }

        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; position: relative; z-index: 20; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #admin-panel { display: none; background: #1a1a1b; padding: 25px; border-bottom: 3px solid var(--neon); z-index: 5000; position: relative; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 8000; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 30px; border-radius: 15px; z-index: 9000; width: 320px; border: 2px solid var(--neon); }

        /* Çark ve Kartlar */
        .wheel-box { text-align: center; margin: 20px auto; padding: 30px; border: 2px dashed var(--neon); border-radius: 20px; width: 320px; background: rgba(0,0,0,0.6); }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .game-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 1px solid #333; }
        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: var(--neon); padding: 10px 20px; border-radius: 5px; z-index: 99999; display: none; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay" class="overlay"></div>
<div id="notification-toast"></div>
<audio id="bg-music" loop></audio>

<nav>
    <div class="logo"><h1 onclick="showSection('home')" style="cursor:pointer; color:var(--neon);">SWASCSHOP</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">ANA SAYFA</button>
        <button onclick="showSection('verify')">DOĞRULA</button>
        <button onclick="showSection('shop')">MAĞAZA</button>
        <button onclick="showSection('library')">KÜTÜPHANE</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <h2 style="text-align:center; color:var(--neon);">👑 YÖNETİCİ TERMİNALİ</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gSecret" placeholder="Gizli Bilgi (Hesap/Pass)">
            <button class="btn" onclick="addGame()">OYUN EKLE</button>
        </div>
        <div>
            <input type="text" id="musicUrl" placeholder="MP3 Link">
            <textarea id="keyList" placeholder="Keyler (Her satıra bir tane)"></textarea>
            <button class="btn" onclick="saveSettings()">AYARLARI KAYDET</button>
        </div>
    </div>
</div>

<div id="home" class="section active">
    <div class="wheel-box">
        <h3>🎡 GÜNLÜK ÇARK</h3>
        <p id="wheel-msg">Ödülünü almak için çevir!</p>
        <button class="btn" id="spin-btn" onclick="spinWheel()">ÇEVİR</button>
    </div>
    <div id="reviewsGrid" style="margin-top:30px; text-align:center;"></div>
</div>

<div id="verify" class="section">
    <div style="max-width:400px; margin:auto; background:var(--card-bg); padding:30px; border-radius:10px; text-align:center;">
        <h2>ANAHTAR DOĞRULA</h2>
        <input type="text" id="verifyKey" placeholder="KEY-XXXX">
        <button class="btn" style="background:var(--accent); margin-top:10px;" onclick="checkKey()">DOĞRULA</button>
    </div>
</div>

<div id="shop" class="section">
    <h2>🛒 OYUNUNU SEÇ</h2>
    <div class="container" id="gameGrid"></div>
</div>

<div id="library" class="section">
    <h2>📚 KÜTÜPHANEM</h2>
    <div id="libraryGrid">Henüz oyunun yok.</div>
</div>

<div id="auth-modal" class="modal">
    <h2 style="text-align:center;">Giriş Yap</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user'), isVerified = false;

    window.onload = () => {
        if(currentUser) { 
            closeAuth(); 
            loadData(); 
            checkWheel();
        } else {
            document.getElementById('auth-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
    };

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== "Swascshop") {
            alert("Önce key doğrula!");
            return showSection('verify');
        }
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = prompt("Şifre:");
        if(u === "Swascshop" && p === "12345") {
            localStorage.setItem('user', u); location.reload();
        } else if(u && p === "shop2026") {
            localStorage.setItem('user', u); location.reload();
        } else { alert("Hatalı!"); }
    }

    function closeAuth() {
        document.getElementById('auth-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('user-controls').innerHTML = `<button class="btn" style="width:auto;" onclick="toggleAdmin()">${currentUser}</button>`;
    }

    function toggleAdmin() {
        if(currentUser === "Swascshop") {
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
    }

    function loadData() {
        // Oyunları Çek
        db.ref('games').on('value', s => {
            const grid = document.getElementById('gameGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                const g = data[id];
                grid.innerHTML += `<div class="game-card">
                    <h3>${g.title}</h3>
                    <button class="btn" onclick="claimGame('${id}', '${g.title}', '${g.secret}')">SEÇ</button>
                </div>`;
            });
        });

        // Kütüphaneyi Çek
        db.ref('users/' + currentUser + '/library').on('value', s => {
            const grid = document.getElementById('libraryGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div style="background:#222; padding:15px; margin-bottom:10px; border-radius:5px;">
                    <strong>${data[id].title}</strong><br>Bilgi: ${data[id].secret}
                </div>`;
            });
        });
    }

    function checkKey() {
        const key = document.getElementById('verifyKey').value;
        db.ref('keys').once('value', s => {
            let keys = s.val() || [];
            const idx = keys.indexOf(key);
            if(idx > -1) {
                keys.splice(idx, 1);
                db.ref('keys').set(keys);
                isVerified = true;
                alert("Başarılı! Mağaza açıldı.");
                showSection('shop');
            } else { alert("Key geçersiz!"); }
        });
    }

    function claimGame(id, title, secret) {
        db.ref('users/' + currentUser + '/library').push({ title, secret });
        isVerified = false;
        alert("Kütüphanene eklendi!");
        showSection('library');
    }

    function spinWheel() {
        const today = new Date().toDateString().replace(/\s/g, "");
        db.ref('wheelLog/' + currentUser + '/' + today).set({ spun: true });
        document.getElementById('wheel-msg').innerText = "Kazandın: KEY!";
        document.getElementById('spin-btn').disabled = true;
    }

    function checkWheel() {
        const today = new Date().toDateString().replace(/\s/g, "");
        db.ref('wheelLog/' + currentUser + '/' + today).once('value', s => {
            if(s.exists() && currentUser !== "Swascshop") {
                document.getElementById('spin-btn').disabled = true;
                document.getElementById('spin-btn').innerText = "BİTTİ";
            }
        });
    }

    function addGame() {
        const title = document.getElementById('gTitle').value;
        const secret = document.getElementById('gSecret').value;
        db.ref('games').push({ title, secret });
        alert("Eklendi!");
    }

    function saveSettings() {
        const keys = document.getElementById('keyList').value.split('\n').filter(k => k.trim());
        db.ref('keys').set(keys);
        db.ref('settings/music').set(document.getElementById('musicUrl').value);
        alert("Kaydedildi!");
    }
</script>
</body>
</html>
