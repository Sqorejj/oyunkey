<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OyunKey | Swascshop Ultimate</title>
    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #43b581;
            --danger: #ff4747;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }

        nav {
            background: #000; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #admin-panel {
            display: none; background: #23272a; padding: 20px;
            border-bottom: 3px solid var(--accent); text-align: center;
        }
        #admin-panel input, #admin-panel textarea { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 220px; background: #eee; font-family: inherit; }
        #admin-panel textarea { width: 90%; max-width: 500px; height: 80px; display: block; margin: 10px auto; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--card-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 0 50px #000; z-index: 2000; width: 320px;
        }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px; }

        .game-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }

        .secret-info { display: none; background: #000; padding: 10px; margin-top: 10px; border-radius: 5px; color: var(--accent); border: 1px dashed var(--accent); word-break: break-all; }
        
        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 5; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
        
        .key-count { font-size: 0.8rem; color: var(--accent); margin-top: 5px; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1>OyunKey</h1></div>
    <div id="user-controls">
        <button id="main-btn" class="btn" onclick="openModal('auth-modal')">Giriş / Kayıt</button>
    </div>
</nav>

<div id="admin-panel">
    <h3 style="color: var(--accent);">Yönetici Paneli (Swascshop)</h3>
    <p>Satış Keyleri (Her satıra bir tane):</p>
    <textarea id="keyList" placeholder="12345-67890&#10;ABCDE-FGHIJ" onchange="saveKeyList()"></textarea>
    <div id="keyStatus" class="key-count">Sistemde 0 aktif key var.</div>
    <hr style="border: 0.5px solid #444; margin: 15px 0;">
    <input type="text" id="gTitle" placeholder="Oyun Adı">
    <input type="text" id="gPrice" placeholder="Fiyat">
    <input type="text" id="gImg" placeholder="Resim URL">
    <input type="text" id="gSecret" placeholder="Gizli Bilgi / Link">
    <button class="btn" style="background: var(--accent);" onclick="addGame()">Oyunu Ekle</button>
    <button class="btn" style="background: #444; margin-left: 10px;" onclick="logout()">Çıkış Yap</button>
</div>

<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı" style="width:90%; padding:10px; margin-bottom:10px;">
    <input type="password" id="uPass" placeholder="Şifre" style="width:90%; padding:10px; margin-bottom:20px;">
    <button class="btn" style="width:100%" onclick="login()">Giriş Yap</button>
</div>

<div id="key-modal" class="modal">
    <h2 style="text-align:center">Key Doğrula</h2>
    <p style="text-align:center; color:#ccc; font-size:0.9rem;">Satın aldığınız kodu buraya girin.</p>
    <input type="text" id="keyInp" placeholder="Keyi buraya yapıştır" style="width:90%; padding:10px; margin-bottom:20px;">
    <button class="btn" style="width:100%" onclick="verifyKey()">Doğrula ve Kullan</button>
</div>

<div class="container" id="gameGrid"></div>

<script>
    let targetGameId = "";
    let games = JSON.parse(localStorage.getItem('games')) || [];
    let keys = JSON.parse(localStorage.getItem('activeKeys')) || [];

    window.onload = function() {
        renderGames();
        checkSession();
        updateKeyUI();
    };

    function updateKeyUI() {
        document.getElementById('keyList').value = keys.join('\n');
        document.getElementById('keyStatus').innerText = `Sistemde ${keys.length} aktif key var.`;
    }

    function saveKeyList() {
        const text = document.getElementById('keyList').value;
        keys = text.split('\n').map(k => k.trim()).filter(k => k !== "");
        localStorage.setItem('activeKeys', JSON.stringify(keys));
        updateKeyUI();
    }

    function checkSession() {
        const loginTime = localStorage.getItem('loginTime');
        const now = new Date().getTime();
        const threeDays = 3 * 24 * 60 * 60 * 1000;

        if (loginTime && (now - loginTime < threeDays)) {
            if(localStorage.getItem('username') === "Swascshop") activateAdmin();
        }
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    }

    function login() {
        const u = document.getElementById('uName').value;
        const p = document.getElementById('uPass').value;

        if(u === "Swascshop" && p === "159357yzgt") {
            localStorage.setItem('loginTime', new Date().getTime());
            localStorage.setItem('username', u);
            activateAdmin();
            closeModals();
        } else {
            alert("Üye girişi başarılı: " + u);
            localStorage.setItem('username', u);
            closeModals();
        }
    }

    function activateAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('user-controls').innerHTML = `<b style="color:var(--accent)">Admin: Swascshop</b>`;
        renderGames();
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function addGame() {
        const t = document.getElementById('gTitle').value;
        const p = document.getElementById('gPrice').value;
        const i = document.getElementById('gImg').value || 'https://via.placeholder.com/300x160/222/fff?text=Oyun';
        const s = document.getElementById('gSecret').value;

        if(t && p) {
            games.push({ id: 'g' + Date.now(), title: t, price: p, img: i, secret: s });
            localStorage.setItem('games', JSON.stringify(games));
            renderGames();
            alert("Oyun eklendi!");
        }
    }

    function deleteGame(id) {
        if(confirm("Silmek istediğine emin misin?")) {
            games = games.filter(g => g.id !== id);
            localStorage.setItem('games', JSON.stringify(games));
            renderGames();
        }
    }

    function renderGames() {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";
        const isAdmin = localStorage.getItem('username') === "Swascshop";

        games.forEach(g => {
            grid.innerHTML += `
            <div class="game-card" id="${g.id}">
                <button class="delete-btn" style="display:${isAdmin ? 'block' : 'none'}" onclick="deleteGame('${g.id}')">SİL</button>
                <img src="${g.img}">
                <div class="game-info">
                    <h3>${g.title}</h3>
                    <p style="color:var(--accent)">${g.price} TL</p>
                    <button class="btn" style="width:100%; background:#333" onclick="targetGameId='${g.id}'; openModal('key-modal')">Key Kullan</button>
                    <div class="secret-info" id="info-${g.id}">${g.secret}</div>
                </div>
            </div>`;
        });
    }

    function verifyKey() {
        const input = document.getElementById('keyInp').value.trim();
        const keyIndex = keys.indexOf(input);

        if(keyIndex > -1) {
            // Key doğru!
            alert("Key doğrulandı ve tek seferlik olduğu için iptal edildi.");
            
            // Keyi listeden sil
            keys.splice(keyIndex, 1);
            localStorage.setItem('activeKeys', JSON.stringify(keys));
            updateKeyUI();

            // Bilgileri göster
            document.getElementById('info-' + targetGameId).style.display = 'block';
            closeModals();
        } else {
            alert("Geçersiz veya daha önce kullanılmış key!");
        }
    }
</script>
</body>
</html>
