<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Full Control v11</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        #top-announcement { background: #ff4655; color: white; text-align: center; padding: 12px; font-weight: bold; position: relative; z-index: 1001; }
        nav { background: rgba(0,0,0,0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo h1 { margin:0; color:var(--neon); cursor: pointer; text-shadow: 0 0 10px var(--neon); }
        .nav-links button { background: none; border: none; color: white; margin: 0 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        #admin-panel { display: none; background: #1f1f23; padding: 30px; border-bottom: 5px solid var(--neon); z-index: 1500; position: relative; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .admin-box { background: #2a2a2e; padding: 15px; border-radius: 12px; border: 1px solid #444; }

        .section { display: none; padding: 40px; max-width: 1200px; margin: auto; animation: fadeIn 0.5s; }
        .active { display: block !important; }

        input, textarea { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #000; width: 100%; color: white; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: var(--neon); box-shadow: 0 0 15px var(--neon); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; position: relative; }
        
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #ff4655; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 5px 8px; font-size: 10px; font-weight: bold; }

        #fake-review-toast { position: fixed; bottom: 20px; left: -400px; background: var(--card-bg); border-left: 5px solid gold; padding: 15px; border-radius: 8px; z-index: 9999; width: 280px; transition: left 0.8s; }
        #fake-review-toast.show { left: 20px; }

        .review-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--neon); width: 280px; position: relative; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 8000; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 30px; border-radius: 15px; z-index: 9000; width: 320px; border: 2px solid var(--neon); display: none; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    </style>
</head>
<body>

<div id="top-announcement">📢 DEĞERLENDİRME YAPANA 1 KEY BEDAVA!</div>
<div id="fake-review-toast">
    <div style="color: gold; font-weight: bold; margin-bottom: 5px;">⭐ YENİ YORUM</div>
    <div id="toast-content" style="font-size: 14px;"></div>
</div>

<div id="overlay" class="overlay"></div>
<div id="auth-modal" class="modal">
    <h2 style="text-align:center; color:var(--neon);">Swascshop Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ</button>
</div>

<nav>
    <div class="logo"><h1 onclick="showSection('home')">SWASCSHOP</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">ANA SAYFA</button>
        <button onclick="showSection('verify')">DOĞRULA</button>
        <button onclick="showSection('shop')">MAĞAZA</button>
        <button onclick="showSection('library')">KÜTÜPHANE</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <h2 style="text-align:center; color:var(--neon);">👑 YÖNETİCİ PANELİ</h2>
    <div class="admin-grid">
        <div class="admin-box">
            <h3>📦 Oyun Ekle</h3>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gSecret" placeholder="Hesap Bilgisi">
            <button class="btn" onclick="addGame()">SİSTEME EKLE</button>
        </div>
        <div class="admin-box">
            <h3>⭐ Fake Yorum Ekle</h3>
            <input type="text" id="revName" placeholder="Kişi İsmi">
            <textarea id="revText" placeholder="Yorum metni..."></textarea>
            <button class="btn" style="background:var(--accent);" onclick="manualReview()">YAYINLA</button>
        </div>
        <div class="admin-box">
            <h3>🔑 Key Havuzu</h3>
            <textarea id="keyList" style="height:80px;" placeholder="Alt alta keyler..."></textarea>
            <button class="btn" onclick="saveKeys()">KAYDET</button>
        </div>
    </div>
</div>

<div id="home" class="section active">
    <h2 style="text-align:center;">Müşteri Değerlendirmeleri</h2>
    <div id="reviewsGrid" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;"></div>
</div>

<div id="verify" class="section">
    <div style="max-width:400px; margin:auto; background:var(--card-bg); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--accent);">
        <h2>ANAHTAR DOĞRULA</h2>
        <input type="text" id="verifyKey" placeholder="KEY-XXXX">
        <button class="btn" onclick="checkKey()" style="background:var(--accent);">ONAYLA</button>
    </div>
</div>

<div id="shop" class="section">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items: center;">
        <h2 style="color:var(--neon);">🛒 MAĞAZA</h2>
        <input type="text" id="gameSearch" placeholder="Oyun ara..." style="width:200px;" onkeyup="searchGames()">
    </div>
    <div class="container" id="gameGrid"></div>
</div>

<div id="library" class="section">
    <h2 style="color:var(--warning);">📚 KÜTÜPHANEM</h2>
    <div id="libraryGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user');
    let isVerified = false;
    let allReviews = [];

    window.onload = () => {
        if(currentUser) { loginSuccess(currentUser); } 
        else { document.getElementById('overlay').style.display = 'block'; document.getElementById('auth-modal').style.display = 'block'; }
    };

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = prompt("Şifre:");
        if((u === "Swascshop" && p === "12345") || (u && p === "shop2026")) {
            localStorage.setItem('user', u);
            location.reload();
        } else alert("Hatalı!");
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('auth-modal').style.display = 'none';
        document.getElementById('user-controls').innerHTML = `<button class="btn" style="width:auto;" onclick="toggleAdmin()">👤 ${user}</button>`;
        loadGlobalData();
        startFakeReviewLoop();
    }

    function loadGlobalData() {
        // Oyunlar ve Silme Butonu
        db.ref('games').on('value', s => {
            const grid = document.getElementById('gameGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                const g = data[id];
                grid.innerHTML += `
                    <div class="game-card">
                        ${currentUser === "Swascshop" ? `<button class="delete-btn" onclick="deleteItem('games/${id}')">SİL</button>` : ''}
                        <h3>${g.title}</h3>
                        <button class="btn" onclick="claimGame('${id}','${g.title}','${g.secret}')">SEÇ</button>
                    </div>`;
            });
        });

        // Yorumlar ve Silme Butonu
        db.ref('reviews').on('value', s => {
            const grid = document.getElementById('reviewsGrid'); grid.innerHTML = "";
            allReviews = [];
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                const r = data[id];
                allReviews.push(r);
                grid.innerHTML += `
                    <div class="review-card">
                        ${currentUser === "Swascshop" ? `<button class="delete-btn" onclick="deleteItem('reviews/${id}')">SİL</button>` : ''}
                        <strong>👤 ${r.name}</strong><br>
                        <span style="color:gold;">⭐⭐⭐⭐⭐</span>
                        <p style="font-size:14px;">"${r.text}"</p>
                    </div>`;
            });
        });

        // Kütüphane
        db.ref('users/' + currentUser + '/library').on('value', s => {
            const grid = document.getElementById('libraryGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div style="background:#111; padding:15px; margin-bottom:10px; border-left:5px solid var(--neon);"><b>${data[id].title}</b><br>Bilgi: ${data[id].secret}</div>`;
            });
        });

        if(currentUser === "Swascshop") {
            db.ref('keys').on('value', s => { document.getElementById('keyList').value = (s.val() || []).join('\n'); });
        }
    }

    function deleteItem(path) {
        if(confirm("Bu içeriği silmek istediğine emin misin?")) {
            db.ref(path).remove().then(() => alert("Başarıyla silindi!"));
        }
    }

    function addGame() {
        const t = document.getElementById('gTitle').value, s = document.getElementById('gSecret').value;
        if(t && s) db.ref('games').push({title: t, secret: s}).then(() => alert("Eklendi!"));
    }

    function manualReview() {
        const n = document.getElementById('revName').value, t = document.getElementById('revText').value;
        if(n && t) db.ref('reviews').push({name: n, text: t}).then(() => alert("Yayınlandı!"));
    }

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== "Swascshop") { alert("Önce key doğrula!"); return; }
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveKeys() {
        const k = document.getElementById('keyList').value.split('\n').filter(x => x.trim());
        db.ref('keys').set(k).then(() => alert("Keyler güncellendi!"));
    }

    function checkKey() {
        const k = document.getElementById('verifyKey').value.trim();
        db.ref('keys').once('value', s => {
            let keys = s.val() || [];
            const i = keys.indexOf(k);
            if(i > -1) {
                keys.splice(i, 1); db.ref('keys').set(keys);
                isVerified = true; alert("Onaylandı!"); showSection('shop');
            } else alert("Geçersiz Key!");
        });
    }

    function claimGame(id, title, secret) {
        db.ref('users/' + currentUser + '/library').push({title, secret});
        isVerified = false; alert("Kütüphaneye eklendi!"); showSection('library');
    }

    function startFakeReviewLoop() {
        const showToast = () => {
            if(allReviews.length === 0) return;
            const r = allReviews[Math.floor(Math.random() * allReviews.length)];
            const t = document.getElementById('fake-review-toast');
            document.getElementById('toast-content').innerHTML = `<b>${r.name}:</b> "${r.text}"`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 120000);
        };
        setInterval(showToast, 600000);
    }

    function toggleAdmin() { if(currentUser === "Swascshop") { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; } }
    function searchGames() {
        const val = document.getElementById('gameSearch').value.toLowerCase();
        document.querySelectorAll('.game-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none"; });
    }
</script>
</body>
</html>
