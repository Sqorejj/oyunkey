<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Unbreakable v8</title>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        #top-announcement { background: #ff4655; color: white; text-align: center; padding: 12px; font-weight: bold; position: relative; z-index: 1001; }
        nav { background: rgba(0,0,0,0.95); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo h1 { margin:0; color:var(--neon); cursor: pointer; text-shadow: 0 0 10px var(--neon); }
        .nav-links button { background: none; border: none; color: white; margin: 0 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

        /* ADMİN PANELİ */
        #admin-panel { display: none; background: #1f1f23; padding: 30px; border-bottom: 5px solid var(--neon); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .admin-box { background: #2a2a2e; padding: 15px; border-radius: 12px; border: 1px solid #444; }

        .section { display: none; padding: 40px; max-width: 1200px; margin: auto; }
        .active { display: block !important; }

        input, textarea { padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #444; background: #000; width: 100%; color: white; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: var(--neon); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .wheel-box { text-align: center; margin: 20px auto; padding: 30px; border: 3px dashed var(--neon); border-radius: 25px; width: 320px; }
        
        #notification-toast { position: fixed; bottom: 20px; left: 20px; background: var(--card-bg); border-left: 5px solid var(--neon); padding: 15px; border-radius: 8px; display: none; z-index: 5000; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 8000; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 30px; border-radius: 15px; z-index: 9000; width: 320px; border: 2px solid var(--neon); display: none; }
    </style>
</head>
<body>

<div id="top-announcement">📢 DEĞERLENDİRME YAPANA 1 KEY BEDAVA!</div>
<div id="notification-toast"></div>

<div id="overlay" class="overlay" style="display: block;"></div>
<div id="auth-modal" class="modal" style="display: block;">
    <h2 style="text-align:center; color:var(--neon);">Swascshop Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ YAP</button>
</div>

<nav>
    <div class="logo"><h1 onclick="showSection('home')">SWASCSHOP</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">ANA SAYFA</button>
        <button onclick="showSection('verify')">DOĞRULA</button>
        <button onclick="showSection('shop')">MAĞAZA</button>
        <button onclick="showSection('library')">KÜTÜPHANE</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <h2 style="text-align:center; color:var(--neon);">👑 ADMİN PANELİ</h2>
    <div class="admin-grid">
        <div class="admin-box">
            <h3>📦 Oyun Ekle</h3>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gSecret" placeholder="Hesap Bilgisi">
            <button class="btn" onclick="addGame()">EKLE</button>
        </div>
        <div class="admin-box">
            <h3>🎡 Ödüller</h3>
            <input type="text" id="wheelRewards" placeholder="Ödül1,Ödül2">
            <button class="btn" onclick="saveWheel()">KAYDET</button>
        </div>
        <div class="admin-box">
            <h3>🔑 Keyler</h3>
            <textarea id="keyList" placeholder="Key1..."></textarea>
            <button class="btn" onclick="saveKeys()">KAYDET</button>
        </div>
    </div>
</div>

<div id="home" class="section active">
    <div class="wheel-box">
        <h2 style="color:var(--neon);">🎡 ÇARK</h2>
        <p id="wheel-msg">Şansını dene!</p>
        <button class="btn" id="spin-btn" onclick="spinWheel()">ÇEVİR</button>
    </div>
</div>

<div id="verify" class="section">
    <div style="max-width:400px; margin:auto; background:var(--card-bg); padding:30px; border-radius:15px; text-align:center; border:1px solid var(--accent);">
        <h2>KEY DOĞRULA</h2>
        <input type="text" id="verifyKey" placeholder="KEY-123">
        <button class="btn" onclick="checkKey()" style="background:var(--accent);">ONAYLA</button>
    </div>
</div>

<div id="shop" class="section">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 style="color:var(--neon);">🛒 MAĞAZA</h2>
        <input type="text" id="gameSearch" placeholder="Ara..." style="width:200px;" onkeyup="searchGames()">
    </div>
    <div class="container" id="gameGrid"></div>
</div>

<div id="library" class="section">
    <h2 style="color:var(--warning);">📚 KÜTÜPHANE</h2>
    <div id="libraryGrid"></div>
</div>

<script>
    // VERİLERİ LOCALSTORAGE'DAN ÇEK
    let games = JSON.parse(localStorage.getItem('games')) || [];
    let keys = JSON.parse(localStorage.getItem('keys')) || ["SWAS-123", "FREE-KEY"];
    let library = JSON.parse(localStorage.getItem('library')) || [];
    let wheelRewards = localStorage.getItem('wheel') || "Key,Pas,Hesap";
    let currentUser = "";
    let isVerified = false;

    function handleLogin() {
        const u = document.getElementById('uName').value;
        const p = prompt("Şifre:");
        if((u === "Swascshop" && p === "12345") || (u && p === "shop2026")) {
            currentUser = u;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('user-controls').innerHTML = `<button class="btn" onclick="toggleAdmin()">${u}</button>`;
            renderGames();
            renderLibrary();
        } else { alert("Hatalı!"); }
    }

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== "Swascshop") return alert("Key doğrula!");
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function renderGames() {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = games.map(g => `<div class="game-card"><h3>${g.title}</h3><button class="btn" onclick="buyGame('${g.title}','${g.secret}')">SEÇ</button></div>`).join('');
    }

    function renderLibrary() {
        document.getElementById('libraryGrid').innerHTML = library.map(l => `<div style="background:#222; padding:10px; margin-top:10px;">${l.title} - ${l.secret}</div>`).join('');
    }

    function addGame() {
        games.push({title: document.getElementById('gTitle').value, secret: document.getElementById('gSecret').value});
        localStorage.setItem('games', JSON.stringify(games));
        renderGames(); alert("Eklendi!");
    }

    function checkKey() {
        const k = document.getElementById('verifyKey').value;
        if(keys.includes(k)) { isVerified = true; alert("Mağaza Açıldı!"); showSection('shop'); } else { alert("Key Yanlış!"); }
    }

    function buyGame(t, s) {
        library.push({title: t, secret: s});
        localStorage.setItem('library', JSON.stringify(library));
        isVerified = false; renderLibrary(); alert("Kütüphaneye eklendi!"); showSection('library');
    }

    function spinWheel() {
        const r = wheelRewards.split(',');
        const win = r[Math.floor(Math.random()*r.length)];
        document.getElementById('wheel-msg').innerText = "KAZANDIN: " + win;
        document.getElementById('spin-btn').disabled = true;
    }

    function toggleAdmin() { if(currentUser === "Swascshop") { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; } }
    function saveKeys() { keys = document.getElementById('keyList').value.split('\n'); localStorage.setItem('keys', JSON.stringify(keys)); alert("Kaydedildi!"); }
    function saveWheel() { wheelRewards = document.getElementById('wheelRewards').value; localStorage.setItem('wheel', wheelRewards); alert("Güncellendi!"); }
    function searchGames() {
        const val = document.getElementById('gameSearch').value.toLowerCase();
        document.querySelectorAll('.game-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
        });
    }
</script>
</body>
</html>
