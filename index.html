<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OyunKey | Swascshop Official</title>
    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #43b581;
            --danger: #ff4747;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        /* Navigasyon */
        nav {
            background: #000; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* Admin Paneli */
        #admin-panel {
            display: none; background: #23272a; padding: 20px;
            border-bottom: 3px solid var(--accent); text-align: center;
        }
        #admin-panel input { padding: 8px; margin: 5px; border-radius: 5px; border: none; width: 180px; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--card-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 0 50px #000; z-index: 2000; width: 320px;
        }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px; }

        .game-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }

        .secret-info { display: none; background: #000; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 0.9rem; color: var(--accent); border: 1px dashed var(--accent); }
        
        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1>OyunKey</h1></div>
    <div id="user-controls">
        <button class="btn" onclick="openModal('auth-modal')">Giriş / Kayıt</button>
    </div>
</nav>

<!-- Admin Paneli -->
<div id="admin-panel">
    <h3 style="color: var(--accent);">Yönetici Paneli (Swascshop)</h3>
    <input type="text" id="gTitle" placeholder="Oyun Adı">
    <input type="text" id="gPrice" placeholder="Fiyat">
    <input type="text" id="gKey" placeholder="Geçerli Key (Şifre)">
    <input type="text" id="gSecret" placeholder="Gizli Bilgi (Link vb.)">
    <button class="btn" style="background: var(--accent);" onclick="createNewGame()">Ekle</button>
</div>

<!-- Giriş Modalı -->
<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı" style="width:90%; padding:10px; margin-bottom:10px;">
    <input type="password" id="uPass" placeholder="Şifre" style="width:90%; padding:10px; margin-bottom:20px;">
    <button class="btn" style="width:100%" onclick="login()">Giriş Yap</button>
</div>

<!-- Key Doğrulama Modalı -->
<div id="key-modal" class="modal">
    <h2 style="text-align:center">Key Doğrula</h2>
    <p style="font-size:0.8rem; color:#aaa">İtemSatış'tan aldığınız kodu girin.</p>
    <input type="text" id="keyInp" placeholder="Örn: XXXX-XXXX" style="width:90%; padding:10px; margin-bottom:20px;">
    <button class="btn" style="width:100%" onclick="verifyKey()">Onayla</button>
</div>

<div class="container" id="gameGrid">
    <!-- Örnek Oyun -->
    <div class="game-card" id="ex1" data-key="LGS2026" data-secret="Hesap Bilgileri: user:admin / pass:123">
        <button class="delete-btn" onclick="this.parentElement.remove()">SİL</button>
        <img src="https://images.alphacoders.com/129/1291122.jpg">
        <div class="game-info">
            <h3>Modern Warfare 2</h3>
            <p style="color:var(--accent)">450 TL</p>
            <button class="btn" style="width:100%; background:#444" onclick="targetGame='ex1'; openModal('key-modal')">Key Gir ve Bilgileri Al</button>
            <div class="secret-info" id="info-ex1"></div>
        </div>
    </div>
</div>

<script>
    let targetGame = "";
    let isLogged = false;

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    }

    function login() {
        const u = document.getElementById('uName').value;
        const p = document.getElementById('uPass').value;

        if(u === "Swascshop" && p === "159357yzgt") {
            alert("Hoş geldin Swascshop!");
            document.getElementById('admin-panel').style.display = 'block';
            document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
            document.getElementById('user-controls').innerHTML = "<b>Admin: Swascshop</b>";
            closeModals();
        } else {
            alert("Giriş yapıldı: " + u);
            isLogged = true;
            closeModals();
        }
    }

    function createNewGame() {
        const t = document.getElementById('gTitle').value;
        const p = document.getElementById('gPrice').value;
        const k = document.getElementById('gKey').value;
        const s = document.getElementById('gSecret').value;
        const id = 'g-' + Date.now();

        if(t && k) {
            const html = `
            <div class="game-card" id="${id}" data-key="${k}" data-secret="${s}">
                <button class="delete-btn" style="display:block" onclick="this.parentElement.remove()">SİL</button>
                <img src="https://via.placeholder.com/300x160/222/fff?text=Oyun">
                <div class="game-info">
                    <h3>${t}</h3>
                    <p style="color:var(--accent)">${p} TL</p>
                    <button class="btn" style="width:100%; background:#444" onclick="targetGame='${id}'; openModal('key-modal')">Key Gir ve Bilgileri Al</button>
                    <div class="secret-info" id="info-${id}"></div>
                </div>
            </div>`;
            document.getElementById('gameGrid').innerHTML += html;
            alert("Oyun ve Key başarıyla eklendi!");
        }
    }

    function verifyKey() {
        const input = document.getElementById('keyInp').value;
        const game = document.getElementById(targetGame);
        const correctKey = game.getAttribute('data-key');
        const secret = game.getAttribute('data-secret');

        if(input === correctKey) {
            alert("Key Doğrulandı! Bilgiler aşağıda açıldı.");
            const infoDiv = document.getElementById('info-' + targetGame);
            infoDiv.innerText = secret;
            infoDiv.style.display = 'block';
            closeModals();
        } else {
            alert("Hatalı Key! Lütfen tekrar deneyin.");
        }
    }
</script>

</body>
</html>
