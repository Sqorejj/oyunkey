<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Global Oyun Mağazası</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #43b581;
            --danger: #ff4747;
            --nav-bg: #000000;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 50px; 
        }

        /* Navigasyon */
        nav {
            background: var(--nav-bg); 
            padding: 10px 30px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .btn {
            background: var(--primary); 
            color: white; 
            border: none;
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        /* Profil Menüsü */
        .profile-container { position: relative; display: inline-block; }
        .profile-menu {
            display: none; 
            position: absolute; 
            right: 0; 
            background: #1a1a1b;
            min-width: 180px; 
            border-radius: 8px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            z-index: 1001;
            border: 1px solid #333; 
            margin-top: 10px;
            overflow: hidden;
        }
        .profile-menu a { 
            color: white; 
            padding: 12px 16px; 
            text-decoration: none; 
            display: block; 
            cursor: pointer; 
            border-bottom: 1px solid #222;
        }
        .profile-menu a:hover { background: #2c2f33; color: var(--primary); }

        /* Admin & Kütüphane Panelleri */
        #admin-panel, #library-panel {
            display: none; 
            background: #23272a; 
            padding: 25px;
            border-bottom: 3px solid var(--accent); 
            text-align: center;
        }

        /* Kartlar */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 40px; 
        }
        .game-card {
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden;
            border: 1px solid #222; 
            position: relative; 
            transition: 0.3s;
        }
        .game-card:hover { border-color: var(--primary); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }

        .delete-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: var(--danger); 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 5px; 
            cursor: pointer; 
            z-index: 10;
        }

        /* Modallar */
        .modal {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%); 
            background: var(--card-bg);
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 0 50px #000; 
            z-index: 2000; 
            width: 320px;
        }
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1500; 
        }
        
        input, textarea { 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 5px; 
            border: none; 
            background: #eee; 
            width: 100%; 
            box-sizing: border-box;
            color: #333;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1 style="margin:0; color:var(--primary); cursor:pointer;" onclick="location.reload()">Swascshop</h1></div>
    <div id="user-controls">
        <button class="btn" onclick="openModal('auth-modal')">Giriş Yap</button>
    </div>
</nav>

<div id="admin-panel">
    <h3 style="color: var(--accent);">👑 Yönetici Paneli</h3>
    <p style="font-size: 12px;">Satılacak Keyleri buraya girin (Her satıra bir tane):</p>
    <textarea id="keyList" placeholder="KEY-ABC-123&#10;KEY-XYZ-456"></textarea>
    <button class="btn" style="background:#555; width:100%; margin-bottom:15px;" onclick="updateKeys()">Key Listesini Güncelle</button>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <input type="text" id="gTitle" placeholder="Oyun Adı">
        <input type="text" id="gPrice" placeholder="Fiyat (TL)">
        <input type="text" id="gImg" placeholder="Resim Linki">
        <input type="text" id="gSecret" placeholder="Gizli Hesap/Bilgi">
    </div>
    <button class="btn" style="background:var(--accent); width:100%; margin-top:10px;" onclick="addGame()">Oyunu Mağazaya Ekle</button>
</div>

<div id="library-panel">
    <h2 style="color: var(--primary);">📚 Kütüphanem</h2>
    <div id="library-content" class="container"></div>
    <button class="btn" onclick="document.getElementById('library-panel').style.display='none'">Kapat</button>
</div>

<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Hoş Geldiniz</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="handleLogin()">Giriş Yap</button>
</div>

<div id="key-modal" class="modal">
    <h2 style="text-align:center">Key Onayla</h2>
    <p style="font-size:12px; color:#aaa;">Bu ürünü aktif etmek için geçerli keyi girin.</p>
    <input type="text" id="keyInp" placeholder="Keyinizi buraya yapıştırın">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="useKey()">Doğrula ve Ekle</button>
</div>

<div class="container" id="gameGrid"></div>

<script>
    // --- FİREBASE YAPILANDIRMASI (Senin bilgilerini buraya çaktım) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    // --- ADMİN AYARLARI ---
    const adminUser = "Swascshop";
    const adminPass = "12345"; // İstediğin zaman değiştirebilirsin

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user');
    let targetGame = null;

    window.onload = () => {
        listenData();
        if(currentUser) setupUI();
    };

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        if(!u) return alert("İsim girmelisin!");

        if(u === adminUser) {
            const p = prompt("Yönetici Şifresi:");
            if(p === adminPass) {
                localStorage.setItem('user', u);
                location.reload();
            } else {
                alert("Şifre yanlış!");
            }
        } else {
            localStorage.setItem('user', u);
            location.reload();
        }
    }

    function listenData() {
        // Oyunları Canlı Dinle
        db.ref('games').on('value', snapshot => {
            const games = snapshot.val() || {};
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            Object.keys(games).forEach(id => {
                const g = games[id];
                grid.innerHTML += `
                    <div class="game-card">
                        ${currentUser === adminUser ? `<button class="delete-btn" onclick="deleteGame('${id}')">SİL</button>` : ''}
                        <img src="${g.img || 'https://via.placeholder.com/300x160'}">
                        <div class="game-info">
                            <h3 style="margin:0;">${g.title}</h3>
                            <p style="color:var(--accent); font-weight:bold;">${g.price} TL</p>
                            <button class="btn" style="width:100%; background:#333;" onclick="prepareKey('${id}', '${g.title}', '${g.secret}', '${g.img}')">Key Kullan</button>
                        </div>
                    </div>`;
            });
        });

        // Keyleri Dinle (Sadece Admin)
        if(currentUser === adminUser) {
            db.ref('keys').on('value', snapshot => {
                document.getElementById('keyList').value = (snapshot.val() || []).join('\n');
            });
        }
    }

    function setupUI() {
        const ctrl = document.getElementById('user-controls');
        ctrl.innerHTML = `
            <div class="profile-container">
                <button class="btn" onclick="toggleMenu()">👤 ${currentUser}</button>
                <div id="pMenu" class="profile-menu">
                    <a onclick="showLibrary()">📚 Kütüphanem</a>
                    ${currentUser === adminUser ? '<a onclick="showAdmin()">👑 Admin Paneli</a>' : ''}
                    <a onclick="localStorage.clear(); location.reload();" style="color:var(--danger)">🚪 Çıkış</a>
                </div>
            </div>`;
    }

    function toggleMenu() {
        const m = document.getElementById('pMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; toggleMenu(); }

    function addGame() {
        const title = document.getElementById('gTitle').value;
        const price = document.getElementById('gPrice').value;
        const img = document.getElementById('gImg').value;
        const secret = document.getElementById('gSecret').value;
        if(title && secret) {
            db.ref('games').push({ title, price, img, secret });
            alert("Oyun başarıyla mağazaya eklendi!");
            document.getElementById('gTitle').value = "";
            document.getElementById('gSecret').value = "";
        } else { alert("Ad ve Gizli Bilgi zorunludur!"); }
    }

    function deleteGame(id) { if(confirm("Bu oyun kaldırılsın mı?")) db.ref('games/' + id).remove(); }

    function updateKeys() {
        const keys = document.getElementById('keyList').value.split('\n').map(k => k.trim()).filter(k => k);
        db.ref('keys').set(keys);
        alert("Key listesi güncellendi!");
    }

    function prepareKey(id, title, secret, img) {
        if(!currentUser) return openModal('auth-modal');
        targetGame = { id, title, secret, img };
        openModal('key-modal');
    }

    function useKey() {
        const input = document.getElementById('keyInp').value.trim();
        db.ref('keys').once('value', snapshot => {
            let currentKeys = snapshot.val() || [];
            const idx = currentKeys.indexOf(input);
            if(idx > -1) {
                currentKeys.splice(idx, 1);
                db.ref('keys').set(currentKeys);
                db.ref('libraries/' + currentUser).push(targetGame);
                alert("BAŞARILI! Ürün kütüphanene eklendi.");
                closeModals();
            } else { alert("GEÇERSİZ KEY! Lütfen tekrar kontrol edin."); }
        });
    }

    function showLibrary() {
        document.getElementById('library-panel').style.display = 'block';
        toggleMenu();
        db.ref('libraries/' + currentUser).on('value', snapshot => {
            const data = snapshot.val() || {};
            const content = document.getElementById('library-content');
            content.innerHTML = "";
            Object.values(data).forEach(g => {
                content.innerHTML += `
                    <div class="game-card">
                        <img src="${g.img}">
                        <div class="game-info">
                            <h3>${g.title}</h3>
                            <div style="background:#000; padding:10px; border:1px dashed var(--accent); font-size:12px; color:var(--accent);">
                                <strong>GİZLİ BİLGİ:</strong><br>${g.secret}
                            </div>
                        </div>
                    </div>`;
            });
            if(Object.keys(data).length === 0) content.innerHTML = "<p>Kütüphanen henüz boş.</p>";
        });
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
</script>

</body>
</html>
