<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Global Oyun Mağazası</title>
    
    <!-- Firebase Bağlantısı (Kütüphaneler) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #43b581;
            --danger: #ff4747;
            --nav-bg: #000000;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 50px; 
        }

        /* --- Navigasyon ve Profil --- */
        nav {
            background: var(--nav-bg); 
            padding: 10px 30px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .btn {
            background: var(--primary); 
            color: white; 
            border: none;
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; }

        .profile-container { position: relative; display: inline-block; }
        .profile-menu {
            display: none; 
            position: absolute; 
            right: 0; 
            background: #1a1a1b;
            min-width: 180px; 
            border-radius: 8px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            z-index: 1001;
            border: 1px solid #333; 
            margin-top: 10px;
            overflow: hidden;
        }
        .profile-menu a { 
            color: white; 
            padding: 12px 16px; 
            text-decoration: none; 
            display: block; 
            cursor: pointer; 
            border-bottom: 1px solid #222;
        }
        .profile-menu a:hover { background: #2c2f33; color: var(--primary); }

        /* --- Paneller --- */
        #admin-panel, #library-panel {
            display: none; 
            background: #23272a; 
            padding: 25px;
            border-bottom: 3px solid var(--accent); 
            text-align: center;
        }

        /* --- Oyun Kartları --- */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 40px; 
        }
        .game-card {
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden;
            border: 1px solid #222; 
            position: relative; 
            transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }

        .delete-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            background: var(--danger); 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 5px; 
            cursor: pointer; 
        }

        /* --- Modallar --- */
        .modal {
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%); 
            background: var(--card-bg);
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 0 50px #000; 
            z-index: 2000; 
            width: 320px;
        }
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1500; 
        }
        
        input, textarea { 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 5px; 
            border: none; 
            background: #eee; 
            width: 100%; 
            box-sizing: border-box;
        }
        textarea { height: 100px; font-family: inherit; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1 style="margin:0; color:var(--primary);">Swascshop</h1></div>
    <div id="user-controls">
        <button class="btn" onclick="openModal('auth-modal')">Giriş Yap</button>
    </div>
</nav>

<!-- Admin Paneli -->
<div id="admin-panel">
    <h3 style="color: var(--accent);">👑 Yönetici Kontrol Paneli</h3>
    <div style="max-width: 600px; margin: 0 auto;">
        <p>Satış Keyleri (Her satıra bir tane):</p>
        <textarea id="keyList" placeholder="Örn:&#10;KEY-123&#10;KEY-456" onchange="updateKeys()"></textarea>
        <hr style="border:0.5px solid #444; margin:20px 0;">
        <input type="text" id="gTitle" placeholder="Oyun Adı">
        <input type="text" id="gPrice" placeholder="Fiyat (TL)">
        <input type="text" id="gImg" placeholder="Resim Linki (URL)">
        <input type="text" id="gSecret" placeholder="Gizli Bilgi (Hesap/Link)">
        <button class="btn" style="background:var(--accent); width:100%;" onclick="addGame()">Yeni Oyun Ekle</button>
    </div>
</div>

<!-- Kütüphane Paneli -->
<div id="library-panel">
    <h2 style="color: var(--primary);">📚 Kütüphanem</h2>
    <div id="library-content" class="container" style="padding:10px;"></div>
    <button class="btn" style="background:#444" onclick="document.getElementById('library-panel').style.display='none'">Kapat</button>
</div>

<!-- Modallar -->
<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Hoş Geldiniz</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="login()">Hızlı Giriş</button>
</div>

<div id="key-modal" class="modal">
    <h2 style="text-align:center">Key Doğrula</h2>
    <p style="font-size:13px; color:#aaa;">Bu oyunu kütüphanenize eklemek için İtemSatış'tan aldığınız kodu girin.</p>
    <input type="text" id="keyInp" placeholder="Keyi buraya yapıştır">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="useKey()">Doğrula ve Aktif Et</button>
</div>

<div class="container" id="gameGrid">
    <!-- Oyunlar Buraya Gelecek -->
</div>

<script>
    // --- BURAYI KENDİ BİLGİLERİNLE DOLDUR (Firebase -> Project Settings) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    // -----------------------------------------------------------------------

    // Firebase Başlat
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = localStorage.getItem('user');
    let targetGame = null;

    window.onload = () => {
        listenData();
        if(currentUser) setupUI();
    };

    // Firebase'den Verileri Canlı Dinle
    function listenData() {
        // Oyun Listesi
        db.ref('games').on('value', snapshot => {
            const games = snapshot.val() || {};
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            
            Object.keys(games).forEach(id => {
                const g = games[id];
                grid.innerHTML += `
                    <div class="game-card">
                        ${currentUser === 'Swascshop' ? `<button class="delete-btn" onclick="deleteGame('${id}')">SİL</button>` : ''}
                        <img src="${g.img || 'https://via.placeholder.com/300x160?text=Oyun'}">
                        <div class="game-info">
                            <h3 style="margin:0;">${g.title}</h3>
                            <p style="color:var(--accent); font-weight:bold;">${g.price} TL</p>
                            <button class="btn" style="width:100%; background:#333;" onclick="prepareKey('${id}', '${g.title}', '${g.secret}', '${g.img}')">Key Kullan</button>
                        </div>
                    </div>`;
            });
        });

        // Key Listesi (Sadece Admin Görür)
        if(currentUser === 'Swascshop') {
            db.ref('keys').on('value', snapshot => {
                const kList = snapshot.val() || [];
                document.getElementById('keyList').value = kList.join('\n');
            });
        }
    }

    function login() {
        const u = document.getElementById('uName').value.trim();
        if(!u) return alert("İsim yazmalısın!");
        localStorage.setItem('user', u);
        location.reload();
    }

    function setupUI() {
        const ctrl = document.getElementById('user-controls');
        ctrl.innerHTML = `
            <div class="profile-container">
                <button class="btn" onclick="toggleMenu()">👤 ${currentUser}</button>
                <div id="pMenu" class="profile-menu">
                    <a onclick="showLibrary()">📚 Kütüphanem</a>
                    ${currentUser === 'Swascshop' ? '<a onclick="showAdmin()">👑 Admin Panel</a>' : ''}
                    <a onclick="logout()" style="color:var(--danger)">🚪 Çıkış Yap</a>
                </div>
            </div>`;
    }

    function toggleMenu() {
        const m = document.getElementById('pMenu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function showAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        toggleMenu();
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    // --- Admin İşlemleri ---
    function addGame() {
        const title = document.getElementById('gTitle').value;
        const price = document.getElementById('gPrice').value;
        const img = document.getElementById('gImg').value;
        const secret = document.getElementById('gSecret').value;

        if(!title || !secret) return alert("Oyun adı ve Gizli bilgi boş olamaz!");

        db.ref('games').push({ title, price, img, secret });
        alert("Oyun başarıyla eklendi ve tüm dünyada yayına girdi!");
        
        // Formu temizle
        document.getElementById('gTitle').value = "";
        document.getElementById('gPrice').value = "";
        document.getElementById('gSecret').value = "";
    }

    function deleteGame(id) {
        if(confirm("Bu oyunu silmek istediğine emin misin?")) {
            db.ref('games/' + id).remove();
        }
    }

    function updateKeys() {
        const keyArray = document.getElementById('keyList').value.split('\n').map(k => k.trim()).filter(k => k !== "");
        db.ref('keys').set(keyArray);
    }

    // --- Müşteri İşlemleri ---
    function prepareKey(id, title, secret, img) {
        if(!currentUser) return openModal('auth-modal');
        targetGame = { id, title, secret, img };
        openModal('key-modal');
    }

    function useKey() {
        const inputKey = document.getElementById('keyInp').value.trim();
        if(!inputKey) return alert("Key girmelisin!");

        db.ref('keys').once('value', snapshot => {
            let currentKeys = snapshot.val() || [];
            const idx = currentKeys.indexOf(inputKey);

            if(idx > -1) {
                // Keyi sil
                currentKeys.splice(idx, 1);
                db.ref('keys').set(currentKeys);
                
                // Kütüphaneye ekle
                db.ref('libraries/' + currentUser).push(targetGame);
                
                alert("MÜJDE! Oyun kütüphanene eklendi. Hesabım > Kütüphanem kısmından bilgilere ulaşabilirsin.");
                closeModals();
            } else {
                alert("HATA: Bu key geçersiz veya daha önce kullanılmış!");
            }
        });
    }

    function showLibrary() {
        document.getElementById('library-panel').style.display = 'block';
        toggleMenu();
        
        db.ref('libraries/' + currentUser).on('value', snapshot => {
            const data = snapshot.val() || {};
            const content = document.getElementById('library-content');
            content.innerHTML = "";
            
            Object.values(data).forEach(g => {
                content.innerHTML += `
                    <div class="game-card">
                        <img src="${g.img || 'https://via.placeholder.com/300x160'}">
                        <div class="game-info">
                            <h3 style="margin:0;">${g.title}</h3>
                            <div style="background:#000; padding:10px; margin-top:10px; border:1px dashed var(--accent); color:var(--accent); font-size:12px; word-break:break-all;">
                                <strong>GİZLİ BİLGİ/LİNK:</strong><br>${g.secret}
                            </div>
                        </div>
                    </div>`;
            });
            if(Object.keys(data).length === 0) content.innerHTML = "<p>Henüz hiç oyunun yok. Bir key kullanarak başlayabilirsin!</p>";
        });
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
