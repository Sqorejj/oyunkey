<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swascshop | Pro Gaming Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #7289da; 
            --bg: #0b0b0b; 
            --card-bg: #161616; 
            --text: #ffffff; 
            --accent: #43b581; 
            --danger: #ff4747;
            --neon: #9146ff; /* Mor Neon */
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #0b0b0b 80%);
        }

        nav { 
            background: rgba(0,0,0,0.9); 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--neon); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        /* RGB Kartlar */
        .game-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #222; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .game-card:hover { 
            transform: scale(1.05); 
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.4);
        }

        .game-card img { width: 100%; height: 160px; object-fit: cover; transition: 0.5s; }
        .game-card:hover img { filter: brightness(1.2); }

        /* Kategori Filtreleri */
        .filter-bar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            padding: 20px; 
            flex-wrap: wrap; 
        }
        .filter-btn {
            background: #222; 
            color: #aaa; 
            border: 1px solid #333; 
            padding: 8px 18px; 
            border-radius: 20px; 
            cursor: pointer;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { 
            background: var(--neon); 
            color: white; 
            border-color: var(--neon); 
            box-shadow: 0 0 10px var(--neon);
        }

        /* Butonlar */
        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* Paneller & Diğerleri */
        #admin-panel, #library-panel { display: none; background: #1a1a1b; padding: 25px; border-bottom: 3px solid var(--neon); text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 40px; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 0 50px #000; z-index: 2000; width: 320px; border: 1px solid var(--neon); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1500; }
        input, textarea, select { padding: 12px; margin: 8px 0; border-radius: 5px; border: none; background: #222; width: 100%; box-sizing: border-box; color: white; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1 style="margin:0; color:var(--neon); font-style: italic;">SWASCSHOP</h1></div>
    <div id="user-controls"><button class="btn" onclick="openModal('auth-modal')">Giriş Yap</button></div>
</nav>

<div id="admin-panel">
    <h3 style="color: var(--neon);">👑 Yönetici Kontrol Merkezi</h3>
    <textarea id="keyList" style="height:60px;" placeholder="Keyleri alt alta yapıştırın..."></textarea>
    <button class="btn" style="width:100%; margin-bottom:15px; background:#444;" onclick="updateKeys()">Keyleri Depola</button>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <input type="text" id="gTitle" placeholder="Oyun Adı">
        <input type="text" id="gPrice" placeholder="Fiyat (TL)">
        <input type="text" id="gImg" placeholder="Resim Linki">
        <select id="gCat">
            <option value="Hepsi">Kategori Seç</option>
            <option value="Steam">Steam</option>
            <option value="Valorant">Valorant</option>
            <option value="Roblox">Roblox</option>
            <option value="Random">Random Key</option>
        </select>
        <input type="text" id="gSecret" placeholder="Gizli Bilgi" style="grid-column: span 2;">
    </div>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="addGame()">Sisteme Entegre Et</button>
</div>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filterGames('Hepsi')">Tümü</button>
    <button class="filter-btn" onclick="filterGames('Steam')">Steam</button>
    <button class="filter-btn" onclick="filterGames('Valorant')">Valorant</button>
    <button class="filter-btn" onclick="filterGames('Roblox')">Roblox</button>
    <button class="filter-btn" onclick="filterGames('Random')">Random Key</button>
</div>

<div id="library-panel">
    <h2 style="color: var(--primary);">📚 Kütüphanem</h2>
    <div id="library-content" class="container"></div>
    <button class="btn" onclick="document.getElementById('library-panel').style.display='none'">Kapat</button>
</div>

<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Erişim Paneli</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
