<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swascshop | Mobile Fix v12</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        * { box-sizing: border-box; touch-action: manipulation; } /* Mobil tıklama hızı için */
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        
        /* DUYURU BANDI */
        #top-announcement { background: #ff4655; color: white; text-align: center; padding: 12px; font-weight: bold; position: relative; z-index: 100; }

        nav { background: rgba(0,0,0,0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo h1 { margin:0; color:var(--neon); font-size: 20px; text-shadow: 0 0 10px var(--neon); cursor: pointer; }
        .nav-links button { background: none; border: none; color: white; margin: 0 5px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* ADMİN PANELİ */
        #admin-panel { display: none; background: #1f1f23; padding: 20px; border-bottom: 5px solid var(--neon); position: relative; z-index: 1100; }

        .section { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .active { display: block !important; }

        input, textarea { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #000; width: 100%; color: white; font-size: 16px; } /* Mobilde zoom yapmaması için 16px */
        
        .btn { 
            background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; 
            cursor: pointer; font-weight: bold; width: 100%; display: block; 
            position: relative; z-index: 5; /* Butonların tıklanabilir olması için */
        }
        .btn:active { transform: scale(0.98); background: var(--neon); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; } /* Mobilde yan yana 2 kart için */
        .game-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; position: relative; }
        
        .delete-btn { position: absolute; top: 5px; right: 5px; background: #ff4655; color: white; border: none; border-radius: 5px; padding: 5px; z-index: 10; }

        /* MODAL VE OVERLAY DÜZENLEME */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 8000; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 25px; border-radius: 20px; z-index: 9000; width: 90%; max-width: 350px; border: 2px solid var(--neon); display: none; }

        #fake-review-toast { 
            position: fixed; bottom: 20px; left: -400px; background: var(--card-bg); border-left: 5px solid gold; 
            padding: 15px; border-radius: 8px; z-index: 5000; width: 280px; transition: 0.5s;
            pointer-events: none; /* Mobilde butonların üzerine gelse bile tıklamayı engellemez */
        }
        #fake-review-toast.show { left: 20px; }
    </style>
</head>
<body>

<div id="top-announcement">📢 DEĞERLENDİRME YAPANA 1 KEY BEDAVA!</div>
<div id="fake-review-toast"><div id="toast-content"></div></div>

<div id="overlay" class="overlay"></div>
<div id="auth-modal" class="modal">
    <h2 style="text-align:center; color:var(--neon);">Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ YAP</button>
</div>

<nav>
    <div class="logo"><h1 onclick="showSection('home')">SWASC</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">ANA</button>
        <button onclick="showSection('verify')">KEY</button>
        <button onclick="showSection('shop')">MARKET</button>
        <button onclick="showSection('library')">KÜTÜPHANE</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <div class="admin-grid">
        <div class="admin-box">
            <h3>📦 Oyun Ekle</h3>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gSecret" placeholder="Hesap">
            <button class="btn" onclick="addGame()">EKLE</button>
        </div>
        <div class="admin-box">
            <h3>⭐ Yorum Ekle</h3>
            <input type="text" id="revName" placeholder="İsim">
            <textarea id="revText" placeholder="Yorum"></textarea>
            <button class="btn" onclick="manualReview()">YAYINLA</button>
        </div>
    </div>
</div>

<div id="home" class="section active"><div id="reviewsGrid"></div></div>
<div id="verify" class="section">
    <input type="text" id="verifyKey" placeholder="ANAHTAR">
    <button class="btn" onclick="checkKey()">ONAYLA</button>
</div>
<div id="shop" class="section">
    <input type="text" id="gameSearch" placeholder="Ara..." onkeyup="searchGames()">
    <div class="container" id="gameGrid"></div>
</div>
<div id="library" class="section"><div id="libraryGrid"></div></div>

<script>
    // Firebase Config (Aynı kalsın)
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user');
    let isVerified = false;
    let allReviews = [];

    window.onload = () => {
        if(currentUser) loginSuccess(currentUser);
        else { document.getElementById('overlay').style.display = 'block'; document.getElementById('auth-modal').style.display = 'block'; }
    };

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = prompt("Şifre:");
        if((u === "Swascshop" && p === "12345") || (u && p === "shop2026")) {
            localStorage.setItem('user', u);
            location.reload();
        } else alert("Hata!");
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('user-controls').innerHTML = `<button onclick="toggleAdmin()" style="background:none; border:none; color:var(--neon); font-weight:bold;">👤 ${user}</button>`;
        loadData();
    }

    function loadData() {
        db.ref('games').on('value', s => {
            const grid = document.getElementById('gameGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div class="game-card">
                    ${currentUser === "Swascshop" ? `<button class="delete-btn" onclick="deleteItem('games/${id}')">X</button>` : ''}
                    <h3>${data[id].title}</h3>
                    <button class="btn" onclick="claimGame('${id}','${data[id].title}','${data[id].secret}')">SEÇ</button>
                </div>`;
            });
        });
        
        db.ref('reviews').on('value', s => {
            const grid = document.getElementById('reviewsGrid'); grid.innerHTML = "";
            allReviews = Object.values(s.val() || {});
            allReviews.forEach(r => {
                grid.innerHTML += `<div class="review-card"><strong>${r.name}</strong><p>${r.text}</p></div>`;
            });
        });

        db.ref('users/' + currentUser + '/library').on('value', s => {
            const grid = document.getElementById('libraryGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div style="border-left:4px solid var(--neon); padding:10px; margin:5px;"><b>${data[id].title}</b><br>${data[id].secret}</div>`;
            });
        });
    }

    function claimGame(id, title, secret) {
        db.ref('users/' + currentUser + '/library').push({title, secret}).then(() => {
            isVerified = false; 
            alert("Eklendi!"); 
            showSection('library');
        }).catch(err => alert("Hata: " + err));
    }

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== "Swascshop") return alert("Key lazım!");
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function checkKey() {
        const k = document.getElementById('verifyKey').value.trim();
        db.ref('keys').once('value', s => {
            let keys = s.val() || [];
            if(keys.includes(k)) {
                keys.splice(keys.indexOf(k), 1); db.ref('keys').set(keys);
                isVerified = true; alert("Mağaza açıldı!"); showSection('shop');
            } else alert("Geçersiz!");
        });
    }

    function toggleAdmin() { if(currentUser === "Swascshop") { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; } }
    function addGame() { db.ref('games').push({title: document.getElementById('gTitle').value, secret: document.getElementById('gSecret').value}); }
    function manualReview() { db.ref('reviews').push({name: document.getElementById('revName').value, text: document.getElementById('revText').value}); }
    function deleteItem(path) { if(confirm("Sil?")) db.ref(path).remove(); }
</script>
</body>
</html>
