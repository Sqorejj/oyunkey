<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OyunKey | Swascshop Platform</title>
    <style>
        :root {
            --primary: #7289da;
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #43b581;
            --danger: #ff4747;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }

        /* Navigasyon & Profil */
        nav {
            background: #000; padding: 10px 30px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
        }

        .profile-container { position: relative; display: inline-block; }
        .profile-menu {
            display: none; position: absolute; right: 0; background: #1a1a1b;
            min-width: 160px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1001;
            border: 1px solid #333; margin-top: 10px;
        }
        .profile-menu a { color: white; padding: 12px 16px; text-decoration: none; display: block; cursor: pointer; }
        .profile-menu a:hover { background: #2c2f33; color: var(--primary); }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* Admin & Diğer Paneller */
        #admin-panel, #library-panel {
            display: none; background: #23272a; padding: 20px;
            border-bottom: 3px solid var(--accent); text-align: center;
        }
        
        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--card-bg);
            padding: 30px; border-radius: 15px; box-shadow: 0 0 50px #000; z-index: 2000; width: 320px;
        }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px; }

        .game-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid #222; position: relative; transition: 0.3s;
        }
        .game-card img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }

        .delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
        
        input, textarea { padding: 8px; margin: 5px; border-radius: 5px; border: none; background: #eee; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<nav>
    <div class="logo"><h1>OyunKey</h1></div>
    <div id="user-controls">
        <button class="btn" onclick="openModal('auth-modal')">Giriş Yap</button>
    </div>
</nav>

<!-- Admin Paneli -->
<div id="admin-panel">
    <h3 style="color: var(--accent);">👑 Admin Kontrol Merkezi</h3>
    <textarea id="keyList" style="width: 80%;" placeholder="Keyleri alt alta girin..." onchange="saveKeys()"></textarea>
    <br>
    <input type="text" id="gTitle" placeholder="Oyun Adı">
    <input type="text" id="gPrice" placeholder="Fiyat">
    <input type="text" id="gImg" placeholder="Resim URL">
    <input type="text" id="gSecret" placeholder="Hesap/Link Bilgisi">
    <button class="btn" style="background:var(--accent)" onclick="addGame()">Ekle</button>
</div>

<!-- Kütüphanem Paneli -->
<div id="library-panel">
    <h2 style="color: var(--primary);">📚 Kütüphanem</h2>
    <div id="library-content" class="container"></div>
    <button class="btn" style="background:#444" onclick="toggleLibrary()">Kapat</button>
</div>

<!-- Giriş Modalı -->
<div id="auth-modal" class="modal">
    <h2 style="text-align:center">Hoş Geldiniz</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı" style="width:90%">
    <input type="password" id="uPass" placeholder="Şifre" style="width:90%">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="login()">Giriş Yap / Kayıt Ol</button>
</div>

<!-- Key Modalı -->
<div id="key-modal" class="modal">
    <h2 style="text-align:center">Key Kullan</h2>
    <input type="text" id="keyInp" placeholder="Keyi girin" style="width:90%">
    <button class="btn" style="width:100%; margin-top:10px;" onclick="useKey()">Kütüphaneye Ekle</button>
</div>

<div class="container" id="gameGrid"></div>

<script>
    let targetGame = null;
    let currentUser = localStorage.getItem('user');
    let games = JSON.parse(localStorage.getItem('games')) || [];
    let keys = JSON.parse(localStorage.getItem('activeKeys')) || [];
    let userLibrary = JSON.parse(localStorage.getItem('library_' + currentUser)) || [];

    window.onload = () => {
        renderGames();
        if(currentUser) setupProfileUI();
    };

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    }

    function login() {
        const u = document.getElementById('uName').value;
        const p = document.getElementById('uPass').value;
        if(!u) return;

        localStorage.setItem('user', u);
        currentUser = u;
        
        alert("Hoş geldiniz, " + u + "!");
        setupProfileUI();
        closeModals();
        location.reload(); // Verileri tazelemek için
    }

    function setupProfileUI() {
        const ctrl = document.getElementById('user-controls');
        const isAdmin = currentUser === "Swascshop";
        
        ctrl.innerHTML = `
            <div class="profile-container">
                <button class="btn" onclick="toggleProfileMenu()">👤 ${currentUser}</button>
                <div id="pMenu" class="profile-menu">
                    <a onclick="toggleLibrary()">Kütüphanem</a>
                    ${isAdmin ? '<a onclick="showAdmin()">Admin Panel</a>' : ''}
                    <a onclick="logout()" style="color:var(--danger)">Çıkış Yap</a>
                </div>
            </div>`;
    }

    function toggleProfileMenu() {
        const menu = document.getElementById('pMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    function showAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('keyList').value = keys.join('\n');
        renderGames();
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    function addGame() {
        const game = {
            id: 'g' + Date.now(),
            title: document.getElementById('gTitle').value,
            price: document.getElementById('gPrice').value,
            img: document.getElementById('gImg').value || 'https://via.placeholder.com/300x160',
            secret: document.getElementById('gSecret').value
        };
        games.push(game);
        localStorage.setItem('games', JSON.stringify(games));
        renderGames();
    }

    function saveKeys() {
        keys = document.getElementById('keyList').value.split('\n').filter(k => k.trim());
        localStorage.setItem('activeKeys', JSON.stringify(keys));
    }

    function renderGames() {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = "";
        games.forEach(g => {
            const isOwned = userLibrary.some(owned => owned.id === g.id);
            grid.innerHTML += `
                <div class="game-card">
                    ${currentUser === 'Swascshop' ? `<button class="delete-btn" style="display:block" onclick="deleteGame('${g.id}')">SİL</button>` : ''}
                    <img src="${g.img}">
                    <div class="game-info">
                        <h3>${g.title}</h3>
                        <p style="color:var(--accent)">${g.price} TL</p>
                        ${isOwned ? '<button class="btn" style="background:#444; width:100%" disabled>Kütüphanede Mevcut</button>' : 
                        `<button class="btn" style="width:100%" onclick="prepareKey('${g.id}')">Key Kullan</button>`}
                    </div>
                </div>`;
        });
    }

    function deleteGame(id) {
        games = games.filter(g => g.id !== id);
        localStorage.setItem('games', JSON.stringify(games));
        renderGames();
    }

    function prepareKey(id) {
        if(!currentUser) return openModal('auth-modal');
        targetGame = games.find(g => g.id === id);
        openModal('key-modal');
    }

    function useKey() {
        const inputKey = document.getElementById('keyInp').value.trim();
        const keyIdx = keys.indexOf(inputKey);

        if(keyIdx > -1) {
            keys.splice(keyIdx, 1);
            localStorage.setItem('activeKeys', JSON.stringify(keys));
            
            userLibrary.push(targetGame);
            localStorage.setItem('library_' + currentUser, JSON.stringify(userLibrary));
            
            alert("Oyun Kütüphanenize Eklendi!");
            closeModals();
            renderGames();
        } else {
            alert("Hatalı veya kullanılmış key!");
        }
    }

    function toggleLibrary() {
        const lib = document.getElementById('library-panel');
        const content = document.getElementById('library-content');
        lib.style.display = lib.style.display === 'block' ? 'none' : 'block';
        
        content.innerHTML = "";
        userLibrary.forEach(g => {
            content.innerHTML += `
                <div class="game-card">
                    <img src="${g.img}">
                    <div class="game-info">
                        <h3>${g.title}</h3>
                        <div style="background:#000; padding:10px; border:1px dashed var(--accent); font-size:12px;">
                            <strong>Bilgiler:</strong> ${g.secret}
                        </div>
                    </div>
                </div>`;
        });
    }
</script>

</body>
</html>
