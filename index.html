<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swascshop | Swascshop</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #7289da; --bg: #0b0b0b; --card-bg: #161616; --text: #ffffff; --neon: #9146ff; --accent: #43b581; --warning: #f1c40f; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }

        #top-announcement { background: #ff4655; color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 13px; position: sticky; top: 0; z-index: 1100; }
        nav { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); }
        .logo h1 { margin:0; color:var(--neon); font-size: 1.5rem; cursor: pointer; }
        .nav-links { display: flex; gap: 8px; }
        .nav-links button { background: none; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        #admin-panel { display: none; background: #1f1f23; padding: 20px; border-bottom: 3px solid var(--neon); }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .admin-box { background: #2a2a2e; padding: 15px; border-radius: 10px; border: 1px solid #444; }

        .section { display: none; padding: 20px; width: 95%; max-width: 1200px; margin: auto; }
        .active { display: block !important; }

        input, textarea { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #000; width: 100%; color: white; font-size: 16px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; position: relative; z-index: 10; }
        .btn:hover { background: var(--neon); }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        @media (max-width: 600px) { .container { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

        .game-card { background: var(--card-bg); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; position: relative; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 5px; padding: 5px 8px; z-index: 20; font-size: 10px; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 8000; display: none; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card-bg); padding: 25px; border-radius: 20px; z-index: 9000; width: 90%; max-width: 340px; border: 2px solid var(--neon); display: none; }
        
        #current-keys-info { font-size: 12px; color: var(--accent); margin-top: 10px; max-height: 100px; overflow-y: auto; background: #111; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="top-announcement">📢 LGS SONRASI SWASCSHOP'TA DEV İNDİRİM!</div>

<div id="overlay" class="overlay"></div>
<div id="auth-modal" class="modal">
    <h2 style="text-align:center; color:var(--neon);">Giriş</h2>
    <input type="text" id="uName" placeholder="Kullanıcı Adı">
    <button class="btn" onclick="handleLogin()">GİRİŞ YAP</button>
</div>

<nav>
    <div class="logo"><h1 onclick="showSection('home')">SWASC</h1></div>
    <div class="nav-links">
        <button onclick="showSection('home')">ANA</button>
        <button onclick="showSection('verify')">KEY</button>
        <button onclick="showSection('shop')">MARKET</button>
        <button onclick="showSection('library')">KÜTÜPHANE</button>
    </div>
    <div id="user-controls"></div>
</nav>

<div id="admin-panel">
    <div class="admin-grid">
        <div class="admin-box">
            <h3>📦 Oyun Ekle</h3>
            <input type="text" id="gTitle" placeholder="Oyun Adı">
            <input type="text" id="gSecret" placeholder="Hesap Bilgisi">
            <button class="btn" onclick="addGame()">SİSTEME EKLE</button>
        </div>
        <div class="admin-box">
            <h3>🔑 Key Havuzu</h3>
            <textarea id="keyList" style="height:80px;" placeholder="Alt alta keyler..."></textarea>
            <button class="btn" onclick="saveKeys()">GÜNCELLE</button>
            <div id="current-keys-info">Yükleniyor...</div>
        </div>
        <div class="admin-box">
            <h3>⭐ Fake Yorum</h3>
            <input type="text" id="revName" placeholder="İsim">
            <textarea id="revText" placeholder="Yorum..."></textarea>
            <button class="btn" onclick="manualReview()" style="background:var(--accent);">YAYINLA</button>
        </div>
    </div>
</div>

<div id="home" class="section active">
    <h2 style="text-align:center;">Müşteri Değerlendirmeleri</h2>
    <div id="reviewsGrid" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;"></div>
</div>

<div id="verify" class="section">
    <div style="max-width:400px; margin:auto; background:#111; padding:20px; border-radius:15px; text-align:center;">
        <h2>DOĞRULAMA</h2>
        <input type="text" id="verifyKey" placeholder="KEY-XXXX">
        <button class="btn" onclick="checkKey()" style="background:var(--accent);">ONAYLA</button>
    </div>
</div>

<div id="shop" class="section">
    <input type="text" id="gameSearch" placeholder="Oyun ara..." onkeyup="searchGames()">
    <div class="container" id="gameGrid"></div>
</div>

<div id="library" class="section">
    <h2 style="color:var(--warning);">KÜTÜPHANEM</h2>
    <div id="libraryGrid"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDP-thFeeUtfQ5P4e4wwToAK_xEkrFFcvk",
        authDomain: "swascshop.firebaseapp.com",
        databaseURL: "https://swascshop-default-rtdb.firebaseio.com",
        projectId: "swascshop",
        storageBucket: "swascshop.firebasestorage.app",
        messagingSenderId: "132240652717",
        appId: "1:132240652717:web:a85fe5a857e6d5d2ad4924"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = localStorage.getItem('user');
    let isVerified = false;

    window.onload = () => {
        if(currentUser) loginSuccess(currentUser);
        else { document.getElementById('overlay').style.display = 'block'; document.getElementById('auth-modal').style.display = 'block'; }
    };

    function handleLogin() {
        const u = document.getElementById('uName').value.trim();
        const p = prompt("Şifre:");
        if((u === "Swascshop" && p === "12345") || (u && p === "shop2026")) {
            localStorage.setItem('user', u);
            location.reload();
        } else alert("Hata!");
    }

    function loginSuccess(user) {
        currentUser = user;
        document.getElementById('user-controls').innerHTML = `<button onclick="toggleAdmin()" style="background:none; border:none; color:var(--neon); font-weight:bold; cursor:pointer;">👤 ${user}</button>`;
        loadData();
    }

    function loadData() {
        // Oyunlar
        db.ref('games').on('value', s => {
            const grid = document.getElementById('gameGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div class="game-card">
                    ${currentUser === "Swascshop" ? `<button class="delete-btn" onclick="deleteItem('games/${id}')">SİL</button>` : ''}
                    <h3>${data[id].title}</h3>
                    <button class="btn" onclick="claimGame('${id}','${data[id].title}','${data[id].secret}')">SEÇ</button>
                </div>`;
            });
        });

        // Key Havuzu
        db.ref('keys').on('value', s => {
            const keys = s.val() || [];
            if(currentUser === "Swascshop") {
                document.getElementById('current-keys-info').innerHTML = "<b>Aktif Keyler:</b><br>" + keys.join('<br>');
            }
        });

        // Yorumlar
        db.ref('reviews').on('value', s => {
            const grid = document.getElementById('reviewsGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div style="background:#1a1a1a; padding:15px; border-radius:10px; width:250px;">
                    ${currentUser === "Swascshop" ? `<button class="delete-btn" onclick="deleteItem('reviews/${id}')">X</button>` : ''}
                    <b>👤 ${data[id].name}</b><p style="font-size:13px;">${data[id].text}</p>
                </div>`;
            });
        });

        // KÜTÜPHANE (Canlı Senkronizasyon)
        db.ref('users/' + currentUser + '/library').on('value', s => {
            const grid = document.getElementById('libraryGrid'); grid.innerHTML = "";
            const data = s.val() || {};
            const keys = Object.keys(data);
            if(keys.length === 0) {
                grid.innerHTML = "<p style='color:gray;'>Henüz oyun seçilmedi.</p>";
            } else {
                keys.forEach(id => {
                    grid.innerHTML += `<div style="background:#222; padding:10px; margin-bottom:10px; border-left:4px solid var(--neon);">
                        <b>${data[id].title}</b><br>
                        <small style="color:var(--accent); font-weight:bold;">${data[id].secret}</small>
                    </div>`;
                });
            }
        });
    }

    async function checkKey() {
        const k = document.getElementById('verifyKey').value.trim();
        const snapshot = await db.ref('keys').get();
        let keys = snapshot.val() || [];
        const index = keys.indexOf(k);

        if(index > -1) {
            keys.splice(index, 1);
            await db.ref('keys').set(keys);
            isVerified = true;
            alert("Anahtar Onaylandı! Mağaza Açıldı.");
            showSection('shop');
        } else {
            alert("Geçersiz veya kullanılmış anahtar!");
        }
    }

    async function claimGame(id, title, secret) {
        // Önce Firebase'e yazıyoruz
        await db.ref('users/' + currentUser + '/library').push({title, secret});
        isVerified = false; // Mağaza yetkisini sıfırla (tek kullanımlık)
        alert("Başarılı! Kütüphanene yönlendiriliyorsun...");
        showSection('library');
    }

    function showSection(id) {
        if(id === 'shop' && !isVerified && currentUser !== "Swascshop") return alert("Önce Key!");
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleAdmin() { if(currentUser === "Swascshop") { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; } }
    function addGame() { db.ref('games').push({title: document.getElementById('gTitle').value, secret: document.getElementById('gSecret').value}); }
    function manualReview() { db.ref('reviews').push({name: document.getElementById('revName').value, text: document.getElementById('revText').value}); }
    function deleteItem(path) { if(confirm("Silinsin mi?")) db.ref(path).remove(); }
    function saveKeys() {
        const text = document.getElementById('keyList').value;
        const keys = text.split('\n').map(k => k.trim()).filter(k => k !== "");
        db.ref('keys').set(keys).then(() => { alert("Güncellendi!"); document.getElementById('keyList').value = ""; });
    }
    function searchGames() {
        const val = document.getElementById('gameSearch').value.toLowerCase();
        document.querySelectorAll('.game-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none"; });
    }
</script>
</body>
</html>
